name: Auto Release on Main

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required for creating tags and releases
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25' # Matches your previous setup
          distribution: 'microsoft'
          
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build
          
      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ' | tr -d '\r')
          echo "TAG=v$VERSION" >> $GITHUB_ENV
          
      - name: Stage Release Jars
        run: |
          mkdir -p release_artifacts
          cp build/libs/*.jar release_artifacts/
          rm release_artifacts/*-dev.jar release_artifacts/*-sources.jar || true
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          files: release_artifacts/*.jar
          generate_release_notes: true